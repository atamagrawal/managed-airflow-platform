# Values for the apache/airflow subchart (dependency name: airflow).
# Airflow 3.x: use apiServer instead of webserver. See:
# https://airflow.apache.org/docs/helm-chart/stable/index.html

airflow:
  airflowVersion: "3.2.0"

  executor: "CeleryExecutor"

  config:
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"

  data:
    metadataConnection:
      user: airflow
      pass: airflow
      protocol: postgresql
      host: ~
      port: 5432
      db: airflow

  redis:
    enabled: true
    password: redis123

  apiServer:
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    service:
      type: ClusterIP

  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: "1000m"
        memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"

  workers:
    celery:
      replicas: 1
      resources:
        requests:
          cpu: "1000m"
          memory: "2Gi"
        limits:
          cpu: "2000m"
          memory: "4Gi"
      keda:
        enabled: true
        minReplicaCount: 1
        maxReplicaCount: 5
        pollingInterval: 5
        cooldownPeriod: 30
        query: "SELECT COUNT(*) FROM task_instance WHERE state='queued'"

      persistence:
        enabled: true
        size: 10Gi
        storageClassName: ~

  ingress:
    apiServer:
      enabled: false
      hosts: []
      path: "/"
      annotations:
        kubernetes.io/ingress.class: "nginx"
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      tls:
        enabled: true
        secretName: airflow-tls

  postgresql:
    enabled: true
    auth:
      username: airflow
      password: airflow
      database: airflow
    primary:
      persistence:
        enabled: true
        size: 10Gi

  serviceAccount:
    create: true
    name: ~

  securityContext:
    runAsUser: 50000
    fsGroup: 0

# KEDA ScaledObject (optional; parent chart template if used)
keda:
  enabled: true
  scaledObject:
    name: airflow-worker-scaler
    minReplicaCount: 1
    maxReplicaCount: 5
    pollingInterval: 5
    cooldownPeriod: 30
    triggers:
      - type: postgresql
        metadata:
          targetQueryValue: "1"
          query: "SELECT COUNT(*) FROM task_instance WHERE state='queued'"
          connectionFromEnv: AIRFLOW_CONN_METADATA_DB
