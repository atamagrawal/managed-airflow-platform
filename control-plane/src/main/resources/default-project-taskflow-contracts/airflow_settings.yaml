# Local-only dummy catalog: URNs resolve to YAML files under /opt/airflow (no DataHub, no external APIs).
# `@task.contract_*` decorators resolve via system-managed default connection `data_contract_yaml_default`.
connections:
  - conn_id: data_contract_yaml_default
    conn_type: data_contract_yaml
    host: /opt/airflow
    extra: |
      {"contracts":{"urn:example:sample_dataset":"contracts/sample_dataset.yaml"}}
