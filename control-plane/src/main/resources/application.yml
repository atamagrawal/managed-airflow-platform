spring:
  application:
    name: managed-airflow-control-plane

  datasource:
    url: jdbc:h2:mem:controlplane
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    context-path: /

# Helm configuration
helm:
  chart:
    path: ../helm-charts/airflow-deployment
  repo:
    name: apache-airflow
    url: https://airflow.apache.org

# Logging configuration
logging:
  level:
    com.airflow.platform: INFO
    org.springframework: INFO
    io.kubernetes: WARN

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Control plane login (JWT). Override secrets in production. Tenant APIs require role ADMIN.
platform:
  security:
    jwt-secret: ${PLATFORM_JWT_SECRET:dev-jwt-signing-key-at-least-32-bytes!!}
    jwt-expiration-ms: 86400000
    # Fallback home tenant when a non-admin user's entry has no tenant-id (must exist in DB / Tenants).
    default-tenant-id-for-users: local-default
    # Accounts listed in Admin → Users. Per-user tenant-id = home tenant for non-admins; omit to use default above.
    # Admins are never tenant-scoped in the JWT regardless of tenant-id here.
    users:
      admin:
        password: "{noop}admin"
        roles:
          - ADMIN
          - USER
      user:
        password: "{noop}user"
        roles:
          - USER
        tenant-id: local-default
      # Example second tenant (uncomment after creating that tenant in Admin → Tenants):
      # analyst:
      #   password: "{noop}changeme"
      #   roles:
      #     - USER
      #   tenant-id: acme-corp

# DAG deployment strategy configuration
dag:
  deployment:
    # Strategy for organizing project DAG files: UNIFIED or SEPARATED
    # UNIFIED: project DAGs go to {deployment}/dags/
    # SEPARATED: project DAGs go to {deployment}/projects/{projectId}/dags/
    strategy: UNIFIED

    # Whether to prefix project name in DAG filenames (only applies to UNIFIED strategy)
    # When true, project DAGs will be named as: {projectId}__{dagFileName}.py
    # This helps avoid filename conflicts between projects
    prefix-project-name: false

    # Additional DAG folders for Airflow to scan (comma-separated)
    # Used when SEPARATED strategy is enabled to configure Airflow's dags_folder
    # Example: "/opt/airflow/dags,/opt/airflow/projects/*/dags"
    additional-dag-folders:

# Files copied into every new project (DAGs, contracts, etc.). Edit resources under default-project/ — not ProjectService.
project:
  default-template:
    enabled: true
    location: classpath:default-project/

---
# Production profile configuration
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/airflow_control_plane
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

logging:
  level:
    com.airflow.platform: INFO
    org.springframework: WARN

---
# ECS deployment profile configuration (for test deployments)
spring:
  config:
    activate:
      on-profile: ecs

  datasource:
    url: jdbc:h2:mem:controlplane
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

# Deployment provider configuration
deployment:
  provider: ecs

# AWS configuration
aws:
  region: us-east-1
  ecs:
    cluster-prefix: managed-airflow
    task-execution-role-arn: arn:aws:iam::YOUR_ACCOUNT_ID:role/ecsTaskExecutionRole
    task-role-arn: arn:aws:iam::YOUR_ACCOUNT_ID:role/airflowTaskRole
  efs:
    file-system-id: fs-xxxxxxxxx  # EFS for persistent PostgreSQL data
    access-point-id: fsap-xxxxxxxxx  # Optional: EFS access point
  vpc:
    subnet-ids:
      - subnet-xxxxxxxx
      - subnet-yyyyyyyy
    security-group-ids:
      - sg-xxxxxxxxx

logging:
  level:
    com.airflow.platform: INFO
    org.springframework: INFO
    software.amazon.awssdk: WARN

---
# EC2 deployment profile configuration (for test/dev deployments)
spring:
  config:
    activate:
      on-profile: ec2

  datasource:
    url: jdbc:h2:mem:controlplane
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

# Deployment provider configuration
deployment:
  provider: ec2
  # Optional: same compose.airflow-image override as the local profile (see that block for examples).

# AWS configuration
aws:
  region: us-east-1
  ec2:
    ami-id: ami-xxxxxxxxx  # Amazon Linux 2 AMI ID for your region
    instance-type: t3.medium
    key-name: your-key-pair-name
    subnet-id: subnet-xxxxxxxxx
    security-group-id: sg-xxxxxxxxx
    iam-instance-profile: EC2AirflowInstanceProfile
    command-timeout: 300

logging:
  level:
    com.airflow.platform: INFO
    org.springframework: INFO
    software.amazon.awssdk: WARN

---
# Local deployment profile configuration (for local testing)
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:controlplane
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

# Deployment provider configuration
deployment:
  provider: local
  compose:
      # Data contracts (AIP-07) are not in upstream Airflow; this image bundles the custom provider.
      airflow-image: atamagrawal/airflow:aip07-data-contracts-3.1.8
  # Optional: override the Airflow image in generated docker-compose (scheduler, api-server, workers, …)
  # and the FROM line in the default Dockerfile for newly created projects (when the user does not supply one).
  # If omitted, the image is apache/airflow:{airflowVersion} from the deployment (e.g. apache/airflow:3.1.8).
  # Example in YAML:
  #   compose:
  #     airflow-image: apache/airflow:3.1.8
  # Or a private registry:
  #   compose:
  #     airflow-image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-airflow:3.1.8-custom
  # Or via environment: DEPLOYMENT_COMPOSE_AIRFLOW_IMAGE=apache/airflow:3.1.8

# Local deployment configuration
local:
  base-directory: ${user.home}/airflow-deployments
  docker-compose-timeout: 300

# Local bootstrap defaults
bootstrap:
  default-tenant:
    # Set to false if tenants should be created only via Admin → Tenants (use tenant id matching platform.security.default-tenant-id-for-users).
    enabled: true
    tenant-id: local-default
    name: Local Default Tenant
    email: local-default@managed-airflow.local
    organization: Local Development
    region: local
  default-deployment:
    enabled: true
    name: Local Default Deployment
    description: Auto-created for local development
    airflow-version: 3.1.8
    executor-type: LOCAL

# DAG deployment strategy (override if needed)
dag:
  deployment:
    strategy: UNIFIED  # Use UNIFIED for simpler local development
    prefix-project-name: false

logging:
  level:
    com.airflow.platform: DEBUG
    org.springframework: INFO
