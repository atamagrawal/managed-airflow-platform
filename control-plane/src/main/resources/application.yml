spring:
  application:
    name: managed-airflow-control-plane

  datasource:
    url: jdbc:h2:mem:controlplane
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    context-path: /

# Helm configuration
helm:
  chart:
    path: ../helm-charts/airflow-deployment
  repo:
    name: apache-airflow
    url: https://airflow.apache.org

# Logging configuration
logging:
  level:
    com.airflow.platform: INFO
    org.springframework: INFO
    io.kubernetes: WARN

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

---
# Production profile configuration
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/airflow_control_plane
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

logging:
  level:
    com.airflow.platform: INFO
    org.springframework: WARN

---
# ECS deployment profile configuration (for test deployments)
spring:
  config:
    activate:
      on-profile: ecs

  datasource:
    url: jdbc:h2:mem:controlplane
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

# Deployment provider configuration
deployment:
  provider: ecs

# AWS configuration
aws:
  region: us-east-1
  ecs:
    cluster-prefix: managed-airflow
    task-execution-role-arn: arn:aws:iam::YOUR_ACCOUNT_ID:role/ecsTaskExecutionRole
    task-role-arn: arn:aws:iam::YOUR_ACCOUNT_ID:role/airflowTaskRole
    postgres-host: airflow-postgres.YOUR_REGION.rds.amazonaws.com
    redis-host: airflow-redis.YOUR_REGION.cache.amazonaws.com
  vpc:
    subnet-ids:
      - subnet-xxxxxxxx
      - subnet-yyyyyyyy
    security-group-ids:
      - sg-xxxxxxxxx

logging:
  level:
    com.airflow.platform: INFO
    org.springframework: INFO
    software.amazon.awssdk: WARN

---
# EC2 deployment profile configuration (for test/dev deployments)
spring:
  config:
    activate:
      on-profile: ec2

  datasource:
    url: jdbc:h2:mem:controlplane
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

# Deployment provider configuration
deployment:
  provider: ec2

# AWS configuration
aws:
  region: us-east-1
  ec2:
    ami-id: ami-xxxxxxxxx  # Amazon Linux 2 AMI ID for your region
    instance-type: t3.medium
    key-name: your-key-pair-name
    subnet-id: subnet-xxxxxxxxx
    security-group-id: sg-xxxxxxxxx
    iam-instance-profile: EC2AirflowInstanceProfile
    command-timeout: 300

logging:
  level:
    com.airflow.platform: INFO
    org.springframework: INFO
    software.amazon.awssdk: WARN
