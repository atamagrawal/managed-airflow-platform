---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-control-plane
  namespace: airflow-control-plane
  labels:
    app: managed-airflow-platform
    component: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: managed-airflow-platform
      component: control-plane
  template:
    metadata:
      labels:
        app: managed-airflow-platform
        component: control-plane
    spec:
      serviceAccountName: airflow-control-plane
      containers:
        - name: control-plane
          image: your-registry/managed-airflow-control-plane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: control-plane-db-secret
                  key: password
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: airflow-control-plane
  namespace: airflow-control-plane
  labels:
    app: managed-airflow-platform
    component: control-plane
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: managed-airflow-platform
    component: control-plane

---
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-db-secret
  namespace: airflow-control-plane
type: Opaque
stringData:
  password: "changeme"
  username: "postgres"
  database: "airflow_control_plane"
